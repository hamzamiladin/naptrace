[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # gix v0.66 has known advisories — we don't use affected codepaths
    # (we only use gix for reading repos, not checkout/worktree operations)
    "RUSTSEC-2025-0001",  # gix-worktree-state permissions (we don't checkout)
    "RUSTSEC-2025-0021",  # gix-features SHA-1 collision (read-only use)
    "RUSTSEC-2025-0140",  # gix-date TimeBuf (we don't parse dates)
    "RUSTSEC-2025-0119",  # number_prefix unmaintained (used by indicatif)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
