name: Benchmark

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Run benchmark harness
        run: ./benchmarks/run.sh
        env:
          NAPTRACE: ./target/release/naptrace

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: benchmarks/bench-results.json
