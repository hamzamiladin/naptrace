# Naptrace Benchmark Ground Truth
#
# Real CVEs with known structural variants.
# All CVEs are from 2024-2026, post reasonable LLM training cutoffs.
# Each entry documents the variant relationship for reproducible testing.

# === Family 1: Linux io_uring pbuf UAF chain ===

- cve: CVE-2025-21836
  description: "io_uring pbuf reference count corruption during mmap/unregister race"
  bug_class: USE_AFTER_FREE
  source_repo: https://github.com/torvalds/linux
  patch_commit: 8802766324e1f5d414a81ac43365c20142e85603
  language: c
  family: io_uring_pbuf
  variants:
    - file: io_uring/kbuf.c
      function: io_pbuf_mmap
      is_feasible: true
      notes: "RCU lock insufficient for concurrent mmap+unregister. Variant of CVE-2024-35880."
    - file: io_uring/kbuf.c
      function: io_unregister_pbuf_ring
      is_feasible: true
      notes: "Missing refcount update during buffer list-to-ring conversion."

- cve: CVE-2024-35880
  description: "io_uring pbuf race condition with type confusion"
  bug_class: RACE_CONDITION
  source_repo: https://github.com/torvalds/linux
  patch_commit: 65938e81df2197203bda4b9a0c477e7987218d66
  language: c
  family: io_uring_pbuf
  variants:
    - file: io_uring/kbuf.c
      function: io_pbuf_mmap
      is_feasible: true
      notes: "RCU prevented deallocation but not concurrent updates."

- cve: CVE-2024-0582
  description: "io_uring pbuf UAF via mmap refcount miss"
  bug_class: USE_AFTER_FREE
  source_repo: https://github.com/torvalds/linux
  patch_commit: c392cbecd8eca4c53f2bf508731257d9d0a21c2d
  language: c
  family: io_uring_pbuf
  variants:
    - file: io_uring/kbuf.c
      function: io_pbuf_mmap
      is_feasible: true
      notes: "mmap handler failed to increment refcount for buffer ring pages."

# === Family 2: SQLite integer overflow (Big Sleep) ===

- cve: CVE-2025-6965
  description: "SQLite aggregate terms integer overflow leading to OOB read"
  bug_class: INTEGER_OVERFLOW
  source_repo: https://github.com/sqlite/sqlite
  patch_commit: 5508b56fd24016c
  language: c
  family: sqlite_arithmetic
  variants:
    - file: src/vdbe.c
      function: sqlite3VdbeExec
      is_feasible: true
      notes: "OP_Add/Sub/Multiply without overflow check. Discovered by Big Sleep."
    - file: src/expr.c
      function: exprCodeVector
      is_feasible: true
      notes: "Signed truncation, structurally identical to OP_Add pattern."
    - file: src/func.c
      function: absFunc
      is_feasible: false
      notes: "Potential overflow but runtime sanitizer may exist on this path."

