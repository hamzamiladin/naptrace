# Naptrace Benchmark Ground Truth
#
# Each entry is a CVE with known variant locations.
# All CVEs should be post-January-2026 to avoid training data leakage.
# is_feasible: true = confirmed variant, false = structurally similar but patched/unreachable

- cve: CVE-2025-6965
  description: SQLite integer overflow in VDBE arithmetic opcodes
  bug_class: INTEGER_OVERFLOW
  source_repo: https://github.com/sqlite/sqlite
  patch_commit: placeholder_sha  # replace with actual commit SHA
  language: c
  variants:
    - file: src/expr.c
      line_range: [2100, 2120]
      function: exprCodeVector
      is_feasible: true
      notes: Signed truncation, structurally identical to OP_Add
    - file: src/func.c
      line_range: [885, 900]
      function: absFunc
      is_feasible: false  # needs_runtime_check — sanitizer may exist
      notes: Potential overflow in absFunc but runtime path unclear

